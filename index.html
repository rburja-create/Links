<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dynamic Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --text: #f1f5f9;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header { text-align: center; margin: 40px 0; }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; }

        /* Search Interface */
        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto 40px auto;
        }
        #searchBar {
            width: 100%;
            padding: 15px 20px 15px 45px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        #searchBar:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 18px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }

        .category-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(16px);
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease;
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .link-item:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
            transform: translateX(8px);
        }

        .link-item span { font-weight: 500; font-size: 0.95rem; flex: 1; padding-right: 10px; }
        
        #loader { text-align: center; padding: 80px; font-size: 1.2rem; }
        .hidden { display: none !important; }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="page-title">Loading...</h1>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchBar" placeholder="Search links..." onkeyup="filterLinks()">
        </div>
    </header>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin"></i> Loading Data...
    </div>

    <div id="main-grid" class="grid"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyFom3oN4QkKTkyh5cQ1n3TYzU2CsplUwkxPccbIzlr4O-2DKq0G16QrDbCksAlK1TlhQ/exec";

    // Reusable Message Page Functionality
    function openMessagePage(message) {
        const newWin = window.open('', '_blank');
        if (!newWin) return;

        const textPageContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                <style>
                    body { 
                        margin: 0; padding: 0;
                        font-family: 'Inter', -apple-system, sans-serif; 
                        background: radial-gradient(circle at top right, #1e293b, #0f172a);
                        display: flex; align-items: center; justify-content: center; 
                        min-height: 100vh; color: white; overflow: hidden;
                    }
                    .msg-box {
                        padding: 40px;
                        background: rgba(255, 255, 255, 0.05); 
                        backdrop-filter: blur(16px); 
                        border-radius: 24px; 
                        border: 1px solid rgba(255, 255, 255, 0.1);
                        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
                        max-width: 85%;
                        text-align: center;
                    }
                    h1 { 
                        font-size: 1.8rem; 
                        margin-bottom: 30px; 
                        line-height: 1.5; 
                        white-space: pre-wrap; 
                        font-weight: 500;
                    }
                    .btn {
                        display: inline-flex; align-items: center; gap: 8px;
                        padding: 12px 30px;
                        background: rgba(56, 189, 248, 0.2);
                        color: #38bdf8;
                        text-decoration: none;
                        border-radius: 12px;
                        font-weight: 600;
                        transition: all 0.3s ease;
                        border: 1px solid rgba(56, 189, 248, 0.3);
                        cursor: pointer;
                        font-size: 14px;
                    }
                    .btn:hover { background: rgba(56, 189, 248, 0.3); transform: translateY(-2px); }
                </style>
            </head>
            <body>
                <div class="msg-box">
                    <h1>${message}</h1>
                    <button class="btn" onclick="window.close()">
                        <i class="fas fa-arrow-left"></i> <span>Return</span>
                    </button>
                </div>
            </body>
            </html>
        `;
        newWin.document.write(textPageContent);
        newWin.document.close();
    }

    async function loadLinks() {
        const grid = document.getElementById('main-grid');
        const loader = document.getElementById('loader');
        const titleElement = document.getElementById('page-title');
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            loader.classList.add('hidden');
            if (data.pageTitle) titleElement.innerText = data.pageTitle;

            // Group links into one card for this specific API structure
            // (Since the original Links API returns a flat list)
            const card = document.createElement('div');
            card.className = 'category-card';
            
            const titleHtml = `<div class="category-title"><i class="fas fa-list"></i> Directory</div>`;
            
            let linksHtml = data.links.map(item => {
                const isWebLink = (item.url && typeof item.url === 'string') ? item.url.toLowerCase().trim().startsWith('http') : false;
                const iconClass = isWebLink ? 'fa-solid fa-link' : 'fa-solid fa-comment-dots';
                
                // Return string with appropriate behavior
                return `
                    <div class="link-item" onclick="${isWebLink ? `window.open('${item.url}', '_blank')` : `openMessagePage(\`${item.url.replace(/`/g, '\\`')}\`)`}">
                        <span>${item.name}</span>
                        <i class="${iconClass}" style="font-size: 0.8rem; opacity: 0.4;"></i>
                    </div>
                `;
            }).join('');

            card.innerHTML = titleHtml + `<div class="links-list">${linksHtml}</div>`;
            grid.appendChild(card);

        } catch (error) {
            console.error(error);
            loader.innerHTML = `<div class="error-msg">Failed to load links. Check API deployment.</div>`;
        }
    }

    function filterLinks() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const items = document.querySelectorAll('.link-item');
        
        items.forEach(item => {
            const text = item.innerText.toLowerCase();
            item.style.display = text.includes(term) ? "flex" : "none";
        });
    }

    loadLinks();
</script>
</body>
</html>
